version: 2.1

# demo-react-miniapps — validation pipeline for React Native mini-apps.
# Gate order mirrors .chunk/config.json: install → lint → Trivy → test → bundle.
#
# Set SNYK_TOKEN in Project Settings → Environment Variables to enable Snyk
# (optional; uncomment the Snyk steps below). Trivy needs no secret.

jobs:
  validate-miniapp:
    parameters:
      miniapp_name:
        type: string
      miniapp_path:
        type: string
    docker:
      - image: cimg/node:20.18
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-<< parameters.miniapp_name >>-{{ checksum "<< parameters.miniapp_path >>/package-lock.json" }}
      - run:
          name: Install dependencies
          command: cd << parameters.miniapp_path >> && npm ci
      - save_cache:
          key: v1-deps-<< parameters.miniapp_name >>-{{ checksum "<< parameters.miniapp_path >>/package-lock.json" }}
          paths:
            - << parameters.miniapp_path >>/node_modules
      - run:
          name: Lint
          command: cd << parameters.miniapp_path >> && npm run lint
      - run:
          name: Install Trivy
          command: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - restore_cache:
          keys:
            - v1-trivy-db-
      - run:
          name: "Scan: Trivy (HIGH,CRITICAL)"
          command: cd << parameters.miniapp_path >> && trivy fs --severity HIGH,CRITICAL --exit-code 1 --no-progress .
      - save_cache:
          key: v1-trivy-db-{{ epoch }}
          paths:
            - ~/.cache/trivy
      # Optional — requires SNYK_TOKEN in project env vars:
      # - run:
      #     name: Install Snyk CLI
      #     command: sudo npm install -g snyk
      # - run:
      #     name: "Scan: Snyk (severity high+)"
      #     command: cd << parameters.miniapp_path >> && snyk test --severity-threshold=high
      - run:
          name: Test
          command: cd << parameters.miniapp_path >> && npm test -- --watchAll=false
      - run:
          name: Bundle iOS (JS)
          command: cd << parameters.miniapp_path >> && mkdir -p dist/ios/assets && npm run bundle:ios

workflows:
  demo-react-miniapps:
    jobs:
      - validate-miniapp:
          name: miniapp-payments
          miniapp_name: payments
          miniapp_path: miniapps/payments
      - validate-miniapp:
          name: miniapp-transfers
          miniapp_name: transfers
          miniapp_path: miniapps/transfers
